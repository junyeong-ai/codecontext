name: Package Matrix Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      cli: ${{ steps.filter.outputs.cli }}
      embeddings-hf: ${{ steps.filter.outputs.embeddings-hf }}
      embeddings-openai: ${{ steps.filter.outputs.embeddings-openai }}
      storage-chromadb: ${{ steps.filter.outputs.storage-chromadb }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            core:
              - 'packages/codecontext-core/**'
            cli:
              - 'packages/codecontext-cli/**'
            embeddings-hf:
              - 'packages/codecontext-embeddings-huggingface/**'
            embeddings-openai:
              - 'packages/codecontext-embeddings-openai/**'
            storage-chromadb:
              - 'packages/codecontext-storage-chromadb/**'

  test-packages:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
        package: ['core', 'cli', 'embeddings-huggingface', 'embeddings-openai', 'storage-chromadb']
        exclude:
          # ChromaDB only supports Python 3.11.x
          - python-version: '3.12'
            package: 'storage-chromadb'
          - python-version: '3.13'
            package: 'storage-chromadb'
          - python-version: '3.14'
            package: 'storage-chromadb'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          cd packages/codecontext-${{ matrix.package }}
          uv sync

      - name: Run tests with coverage
        run: |
          cd packages/codecontext-${{ matrix.package }}
          uv run pytest tests/ --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./packages/codecontext-${{ matrix.package }}/coverage.xml
          flags: ${{ matrix.package }}-py${{ matrix.python-version }}
          name: codecontext-${{ matrix.package }}-py${{ matrix.python-version }}
          fail_ci_if_error: false

  test-integration:
    needs: test-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install all packages
        run: uv sync

      - name: Run integration tests
        run: uv run pytest tests/ -m integration

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: integration
          name: codecontext-integration
          fail_ci_if_error: false
