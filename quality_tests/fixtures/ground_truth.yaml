# ============================================================================
# Scoring Notes
# ============================================================================
notes: |
  This ground truth was designed through complete qualitative analysis of:

  Source Code Analyzed:
  - Java: OrderService.java, OrderController.java, Order.java, OrderStatus.java
  - Kotlin: Customer.kt, CustomerTier.kt, CustomerService.kt
  - Python: payment_service.py, payment_gateway.py, inventory_service.py
  - TypeScript/JavaScript: CheckoutFlow.tsx, OrderList.tsx, Cart.tsx,
    orderService.ts, formatPrice.js, calculateShipping.js

  Documentation Analyzed:
  - order-flow.md (complete order lifecycle)
  - customer-tier.md (tier system with examples)
  - payment-gateway.md (gateway architecture)
  - api-design.md (REST principles and examples)
  - system-architecture.md (overall system design)
  - pricing-policy.md (pricing formula and discounts)
  - inventory-management.md (warehouse system)

  Design Rationale:

  1. **Implementation-First Philosophy**
     When an AI agent receives "change tier discount from 15% to 20%", it needs:
     - FIRST: Exact method locations (Customer.getTierDiscount, etc.)
     - SECOND: Data definition (CustomerTier enum)
     - THIRD: Context if needed (documentation)

  2. **Symbol-Level Precision**
     Specifying "OrderService.processOrder" (lines 75-150) is more useful than
     "OrderService.java" because agents need to know WHICH method to modify.

  3. **Multiple Valid Answers**
     For "tier discount", finding ANY of these is correct:
     - Customer.getTierDiscount (Kotlin)
     - OrderService.getTierDiscount (Java)
     - getTierDiscount (JavaScript)
     All three are valid entry points for modification.

  4. **Actionability Scoring**
     - Method (10): Can be modified immediately
     - Class (9): Domain model or service
     - Component (8): Frontend component
     - Documentation (6): Context and understanding
     This reflects actual utility for AI agents.

  5. **Essential Coverage**
     Each query requires:
     - Implementation (to modify)
     - Domain/Doc (to understand structure/context)
     - Context (to see usage or integration)

     This ensures agents get complete information.

  Pass Criteria (Per Query):
  - Essential Coverage: 3/3 categories ✓
  - Actionability: Average ≥ 6.0 (good) or ≥ 8.0 (excellent)
  - Precision: ≥60% of specified symbols found

  Expected Pass Rate with Current System: 7-8/10 (70-80%)
