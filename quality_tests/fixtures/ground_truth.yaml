version: '2.0'
created: '2025-11-12'
description: |
  Utility-Based Ground Truth for E-commerce Sample - Version 2

  Design Philosophy:
  Based on complete qualitative analysis of all source code and documentation,
  this ground truth reflects what AI agents ACTUALLY need when working with code.

  Core Principles:
  1. Symbol-level precision (exact methods/classes, not just files)
  2. Actionability first (prioritize immediately executable code)
  3. Multiple valid answers (recognize alternatives)
  4. Essential coverage (implementation + domain + context)

  Evaluation Dimensions:
  - Essential Coverage: Does top-5 include all three categories?
  - Actionability: Average utility score (methods=10, classes=9, docs=6)
  - Precision: Found exact symbols mentioned?

evaluation_criteria:
  essential_coverage:
    description: "Top-5 must include implementation, domain model OR documentation, and context"
    categories:
      - implementation  # Methods/functions that can be directly modified
      - domain_or_doc  # Domain models (classes/enums) OR documentation
      - context         # Related code or documentation for understanding
    pass_threshold: 3  # All 3 categories
    borderline: 2      # 2 categories

  actionability:
    description: "Average actionability score of top-5 results"
    weights:
      method: 10           # Immediately modifiable
      class: 9             # Domain model or service class
      component: 8         # Frontend component
      document_section: 6  # Documentation
      interface: 5         # Protocol/interface
    excellent_threshold: 8.0
    good_threshold: 6.0
    acceptable_threshold: 5.0

  precision:
    description: "Percentage of essential symbols found in top-5"
    excellent_threshold: 0.8  # 80%
    good_threshold: 0.6       # 60%
    acceptable_threshold: 0.4 # 40%

ground_truth:
  # ============================================================================
  # Q001: Order Processing Flow
  # ============================================================================
  - query_id: Q001
    query: "order processing flow"
    category: workflow
    difficulty: medium
    user_intent: "Understand complete order lifecycle from creation to delivery"

    essentials:
      implementation:
        - symbol: "OrderService::processOrder"
          path: "services/order-service/src/main/java/com/ecommerce/order/service/OrderService.java"
          type: method
          priority: H1
          reason: "Main orchestration - validates inventory, processes payment, creates order"
          lines: "75-150"

        - symbol: "OrderController::createOrder"
          path: "services/order-service/src/main/java/com/ecommerce/order/controller/OrderController.java"
          type: method
          priority: H1
          reason: "API entry point - POST /api/v1/orders endpoint"
          lines: "35-47"

      domain_model:
        - symbol: "Order"
          path: "services/order-service/src/main/java/com/ecommerce/order/domain/Order.java"
          type: class
          priority: H2
          reason: "Order domain entity with items, status, payment"
          lines: "15-133"

        - symbol: "OrderStatus"
          path: "services/order-service/src/main/java/com/ecommerce/order/domain/OrderStatus.java"
          type: enum
          priority: H2
          reason: "Order state machine (PENDING → CONFIRMED → SHIPPED → DELIVERED)"
          lines: "9-54"

      documentation:
        - path: "docs/business/order-flow.md"
          type: document
          priority: H1
          reason: "Complete order flow with state transitions and code examples"
          sections: ["Order States", "Complete Flow", "Integration Points"]

    scoring:
      top5_must_include_at_least_one_from_each:
        implementation: true      # OrderService.processOrder OR OrderController.createOrder
        domain_or_doc: true       # Order OR OrderStatus OR order-flow.md
        context: true             # Any related component

